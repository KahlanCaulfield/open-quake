<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' http: https: file: data: blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: file: http: https:; font-src 'self' data:; connect-src 'self'; media-src 'self' blob: data:; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none';">
<title>HA Schedule</title>
<style>
  :root { --bg:#05080d; --card1:#0b1119; --card2:#070b11; --card1b:#131d2b; --card2b:#0e1721; --bd:#141c28;
    --fg:#e8eef6; --muted:#8aa0b4; --line:#16202e; --line2:#33485f; --accent:#7CFFB2; }
  body.light { --bg:#d9e1ea; --card1:#eef2f7; --card2:#eef2f7; --card1b:#ffffff; --card2b:#ffffff; --bd:#bac7d5;
    --fg:#13202c; --muted:#56697b; --line:#dde4ec; --line2:#c2cedd; }
  * { box-sizing: border-box; }
  html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
  body { background: var(--bg); color: var(--fg); user-select: none; font-family: "Segoe UI", system-ui, sans-serif; }
  #wrap { display: flex; gap: 12px; width: 100vw; height: 100vh; padding: 12px; }
  .box { background: linear-gradient(160deg, var(--card1), var(--card2)); border: 1px solid var(--bd);
    border-radius: 16px; padding: 8px 14px; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
  body.light .box { box-shadow: 0 1px 4px rgba(20,40,70,.10); }
  .agenda { flex: 1; }                 /* left half */
  .events { flex: 1; background: linear-gradient(160deg, var(--card1b), var(--card2b)); }   /* right half, a shade lighter */
  .list { flex: 1; display: flex; flex-direction: column; min-height: 0; }   /* top-aligned: row N of each box lines up */

  /* agenda rows: prominent time, title, small date */
  .ag { display: flex; align-items: center; gap: 18px; height: calc(100% / 6); padding: 0 2px; border-bottom: 1px solid var(--line); }
  .ag:last-child { border-bottom: none; }
  .ag .date { font-size: 25px; font-weight: 600; white-space: nowrap; flex: none; width: 120px; overflow: hidden; text-overflow: ellipsis; }
  .ag .time { color: var(--accent); font-weight: 800; font-size: 25px; white-space: nowrap; flex: none; width: 150px; overflow: hidden; text-overflow: ellipsis; }
  .ag .title { flex: 1; min-width: 0; font-size: 25px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* event rows: title + venue · day · time */
  .ev { display: flex; align-items: center; gap: 18px; height: calc(100% / 6); padding: 0 2px; border-bottom: 1px solid var(--line2); }   /* same flex + gap as the agenda; --line2 stands out on the lighter events card */
  .ev:last-child { border-bottom: none; }
  .ev .eday { flex: none; width: 120px; overflow: hidden; text-overflow: ellipsis; font-weight: 600; font-size: 25px; white-space: nowrap; }   /* date col — fixed, matches agenda .date */
  .ev .etime { flex: none; width: 150px; overflow: hidden; text-overflow: ellipsis; font-weight: 600; font-size: 25px; white-space: nowrap; }   /* time col — fixed, matches agenda .time; empty when no time */
  .ev .venue { flex: none; min-width: 150px; max-width: 300px; color: var(--accent); font-weight: 800; font-size: 25px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }   /* center: accent — unchanged */
  .ev .title { flex: 1; min-width: 0; font-weight: 600; font-size: 25px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }   /* right: white */

  .empty { color: var(--muted); font-size: 18px; display: flex; align-items: center; justify-content: center; flex: 1; text-align: center; padding: 0 10px; }
  #err { position: fixed; left: 14px; bottom: 8px; font-size: 12px; color: #c98; opacity: 0; transition: opacity .3s; }
  #err.show { opacity: 1; }
</style>
</head>
<body>
  <div id="wrap">
    <div class="box agenda"><div class="list" id="agenda"></div></div>
    <div class="box events"><div class="list" id="events"></div></div>
  </div>
  <div id="err"></div>
<script src="/haschedule-ui.js"></script>
</body>
</html>
