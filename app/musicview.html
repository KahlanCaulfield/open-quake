<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' http: https: file: data: blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: file: http: https:; font-src 'self' data:; connect-src 'self'; media-src 'self' blob: data:; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none';">
<title>Music</title>
<style>
  * { box-sizing: border-box; }
  :root { --bg:#05080d; --fg:#e8eef6; --muted:#9fb3c8; --dim:#7e93ab; --surf1:#11202e; --surf2:#0a1119;
    --tile-bd:#1a2738; --btn-bd:#1a2738; --pill:#16202e; --pill-fg:var(--accent); --accent:#7CFFB2; }
  /* Light mode: layered greys (page grey, white cards) with dark outlines + a dark "playing" pill so the
     accent text stays legible — NOT a flat sheet of white. */
  body.light { --bg:#e6ecf3; --fg:#12202c; --muted:#566573; --dim:#566573; --surf1:#ffffff; --surf2:#dfe7ef;
    --tile-bd:#aebccb; --btn-bd:#14202b; --pill:#1b2734; --pill-fg:var(--accent); }
  html, body { margin: 0; width: 100%; height: 100%; }
  body { background: var(--bg); color: var(--fg); overflow: hidden; user-select: none;
    font-family: "Segoe UI", system-ui, sans-serif; }
  /* rule-of-thirds: art anchored left edge | now-playing + transport fill the middle band | grid anchored right edge */
  #wrap { display: flex; width: 100vw; height: 100vh; padding: 26px; align-items: stretch; }
  .art-col { flex: 1; display: flex; align-items: center; justify-content: flex-start; }
  .mid { flex: 1.45; min-width: 0; display: flex; flex-direction: column; justify-content: space-evenly; gap: 28px; padding: 30px 46px; }
  .grid-col { flex: 1; display: flex; align-items: center; justify-content: flex-end; }

  /* album art: the 🎵 note shows until the SMTC .NET helper supplies cover art (then artImg covers it) */
  .art { height: 100%; aspect-ratio: 1/1; border-radius: 18px; position: relative; overflow: hidden;
    background: linear-gradient(160deg, var(--surf1), var(--surf2)); border: 1px solid var(--tile-bd);
    display: flex; align-items: center; justify-content: center; }
  .art .note { font-size: 150px; opacity: .22; }
  .art img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }

  .title { font-size: 52px; font-weight: 800; line-height: 1.12; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .artist { font-size: 32px; color: var(--muted); margin-top: 20px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .status { display: flex; align-items: center; gap: 12px; margin-top: 26px; font-size: 19px; color: var(--dim); }
  .status .pill { padding: 4px 14px; border-radius: 20px; background: var(--pill);
    color: var(--pill-fg); font-weight: 700; letter-spacing: .5px; }
  .controls { display: flex; align-items: center; justify-content: space-between; }
  .btn { width: 92px; height: 92px; border-radius: 50%; border: 2px solid var(--btn-bd); cursor: pointer; color: var(--fg);
    background: linear-gradient(160deg, var(--surf1), var(--surf2)); display: flex; align-items: center; justify-content: center;
    transition: transform .08s ease; }
  .btn:active { transform: scale(.92); }
  .btn svg { width: 42%; height: 42%; fill: currentColor; }
  /* play button carries the accent — the most prominent "live" control on the page */
  .btn.play { width: 116px; height: 116px; color: #04121f; border-color: var(--accent);
    background: linear-gradient(160deg, color-mix(in srgb, var(--accent) 86%, #fff 14%), var(--accent)); }
  body.light .btn.play { border-color: var(--btn-bd); }   /* dark outline in light mode, like the other buttons */

  /* right: the programmable 2x2 grid — a square block with square tiles, matching the Default grid */
  .grid { flex: none; height: 100%; aspect-ratio: 1; display: grid; gap: 16px; }
  .tile { border-radius: 16px; border: 1px solid var(--tile-bd); cursor: pointer; overflow: hidden;
    background: linear-gradient(160deg, var(--surf1), var(--surf2)); display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px; transition: transform .08s ease; }
  .tile:active { transform: scale(.97); }
  .tile .ic { font-size: 52px; line-height: 1; }
  .tile .ic img { width: 60px; height: 60px; object-fit: contain; }
  .tile .lb { font-size: 20px; color: var(--fg); font-weight: 600; padding: 0 8px; text-align: center;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  .tile.empty { background: var(--surf2); border-style: dashed; border-color: var(--tile-bd); cursor: default; }

  #recon { position: fixed; right: 14px; bottom: 10px; font-size: 12px; color: #c98; opacity: 0; transition: opacity .3s; }
  #recon.show { opacity: 1; }
</style>
</head>
<body>
  <div id="wrap">
    <div class="art-col"><div class="art"><div class="note">🎵</div><img id="artImg"></div></div>
    <div class="mid">
      <div>
        <div class="title" id="mTitle">Nothing playing</div>
        <div class="artist" id="mArtist">—</div>
        <div class="status"><span class="pill" id="mStatus">—</span><span id="mApp"></span></div>
      </div>
      <div class="controls">
        <div class="btn" id="bPrev"></div>
        <div class="btn play" id="bPlay"></div>
        <div class="btn" id="bNext"></div>
        <div class="btn" id="bPause"></div>
      </div>
    </div>
    <div class="grid-col"><div class="grid" id="grid"></div></div>
  </div>
  <div id="recon">reconnecting…</div>

<script src="/musicview.js"></script>
</body>
</html>
